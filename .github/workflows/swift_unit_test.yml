name: Swift Unit Test


on:
  pull_request:
    branches: ["dev"]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Setup tests
        run: cp Debug.xcconfig Release.xcconfig

      # Cache steps must run AFTER checkout so Package.resolved exists
      # and hashFiles() produces a real key.
      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: DerivedData/SourcePackages
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: DerivedData
          key: dd-${{ hashFiles('**/Package.resolved') }}-${{ github.sha }}
          restore-keys: |
            dd-${{ hashFiles('**/Package.resolved') }}-
            dd-

      - name: Run Tests
        run: |
          xcodebuild test \
            -project Cangkruk.xcodeproj \
            -scheme Cangkruk \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -derivedDataPath DerivedData \
            -quiet
